<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka 3D Map with Live Weather & Car Animation</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="ui-panel" id="main-panel">
        <div class="panel-header">
            <h1>Ceylon Navigation</h1>
            <button class="min-max-btn" onclick="togglePanel()">➖</button>
        </div>
        <p>Explore Routes & Live Weather across Sri Lanka</p>
        
        <div class="route-box">
            <label>🛫 Start Location:</label>
            <select id="start-loc" onchange="calculateRoute()"></select>
            
            <label>🛬 End Location:</label>
            <select id="end-loc" onchange="calculateRoute()"></select>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">

        <div class="location-list" id="location-list"></div>
    </div>

    <button class="floating-max-btn" id="max-btn" onclick="togglePanel()" style="display: none;">🗺️ Open Panel</button>

    <div id="map"></div>

</body>
</html>
